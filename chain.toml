# Teutonic-Q3-4B — Qwen3-4B dense as genesis king (vanilla HF Qwen3ForCausalLM, no fork).
# vocab 151936, 36 layers x hidden 2560, GQA 32/8 heads, RoPE theta=1e6, ~8 GB bf16.
# Public eval corpus: FineWeb-Edu Hippius mirror tokenized at eval time with Qwen3 tokenizer.
#
# Genesis now lives on Hippius Hub. model_store dispatches by digest prefix:
# `sha256:` for Hippius OCI, `hf:` for HF revisions. Challenger uploads still
# go through Hippius as normal.
[chain]
name = "Teutonic-Q3-4B"
seed_repo = "teutonic/teutonic-q3-4b-genesis"
# repo_pattern auto-derives to "^[^/]+/Teutonic-Q3-4B-.+$" if omitted.

[arch]
module = "archs.qwen3"
# Generic structural keys (vocab/hidden/heads/etc.) are enforced by
# validate_challenger_config automatically. Anything Qwen3-specific that we
# require challengers to preserve goes here.
extra_lock_keys = [
  "rope_theta",
  "rope_scaling",
  "tie_word_embeddings",
  "max_position_embeddings",
]

[seed]
tokenizer_repo = "Qwen/Qwen3-4B"
repo_backend = "hippius"
seed_digest = "sha256:815a11518d36bbd9ad9c56c6cd01f44451fae872a14ada9dc5248fce0fb4626b"
